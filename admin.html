<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>403Music - 播放列表管理</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23121212'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%231DB954'%3E♪%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
  <div class="app">
    <!-- 登录界面 -->
    <div class="admin-login" id="adminLogin">
      <div class="login-card">
        <div class="logo" style="margin-bottom:32px;justify-content:center">
          <span class="logo-icon">♪</span>
          <span class="logo-text">403Music</span>
        </div>
        <h2 class="login-title">播放列表管理</h2>
        <p class="login-desc">请输入管理密码</p>
        <form class="login-form" id="loginForm">
          <input type="password" class="login-input" id="loginPassword" placeholder="输入密码" autocomplete="off" autofocus>
          <button type="submit" class="login-btn">登 录</button>
          <p class="login-error" id="loginError">密码错误，请重试</p>
        </form>
        <a href="index.html" class="login-back">← 返回播放器</a>
      </div>
    </div>

    <!-- 管理界面 -->
    <div class="admin-panel" id="adminPanel" style="display:none">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">♪</span>
          <span class="logo-text">403MY</span>
        </div>
        <div class="header-actions">
          <a href="index.html" class="btn-admin-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回播放器
          </a>
          <button class="btn-admin-logout" id="btnLogout" aria-label="退出登录">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </header>

      <main class="admin-main">
        <!-- Tab 导航 -->
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="songs">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
            歌曲管理
          </button>
          <button class="admin-tab" data-tab="artists">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            歌手管理
          </button>
          <button class="admin-tab" data-tab="albums">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            专辑管理
          </button>
        </div>

        <!-- 歌曲管理 Tab -->
        <div class="admin-tab-content active" id="tabSongs">
          <div class="admin-toolbar">
            <div class="admin-toolbar-actions">
              <div class="admin-search-box">
                <svg class="admin-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="admin-search-input" id="adminSearch" placeholder="搜索歌曲或歌手...">
              </div>
              <button class="btn-export-data" id="btnExportData" title="导出/导入数据">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                导出
              </button>
              <button class="btn-add-song" id="btnAddSong">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                添加歌曲
              </button>
            </div>
          </div>
          <div class="admin-song-list" id="adminSongList"></div>
        </div>

        <!-- 歌手管理 Tab -->
        <div class="admin-tab-content" id="tabArtists">
          <div class="admin-toolbar">
            <h2 class="admin-section-title">歌手列表</h2>
          </div>
          <div class="artist-list-wrapper">
            <div class="admin-artist-list" id="adminArtistList"></div>
            <nav class="letter-index" id="adminLetterIndex"></nav>
          </div>
        </div>

        <!-- 专辑管理 Tab -->
        <div class="admin-tab-content" id="tabAlbums">
          <div class="admin-toolbar">
            <h2 class="admin-section-title">专辑列表</h2>
          </div>
          <div class="admin-album-list" id="adminAlbumList"></div>
        </div>

        <!-- 编辑表单 -->
        <div class="admin-form-overlay" id="adminFormOverlay">
          <div class="admin-form-card">
            <div class="admin-form-header">
              <h3 class="admin-form-title" id="formTitle">添加歌曲</h3>
              <button class="btn-form-close" id="btnFormClose" aria-label="关闭">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
            <form class="admin-form" id="adminForm">
              <input type="hidden" id="editIndex" value="-1">
              <div class="form-group">
                <label for="editTitle">歌曲名称 *</label>
                <input type="text" id="editTitle" placeholder="输入歌曲名称" required>
              </div>
              <div class="form-group">
                <label for="editArtist">歌手 *</label>
                <input type="text" id="editArtist" placeholder="输入歌手名" required>
              </div>
              <div class="form-group">
                <label for="editAlbum">专辑</label>
                <input type="text" id="editAlbum" placeholder="输入专辑名称">
              </div>
              <div class="form-group">
                <label for="editUrl">音频链接 *</label>
                <input type="url" id="editUrl" placeholder="https://example.com/song.mp3" required>
              </div>
              <div class="form-group">
                <label for="editCover">专辑封面链接</label>
                <input type="url" id="editCover" placeholder="https://example.com/cover.jpg">
              </div>
              <div class="form-group form-group-lyrics">
                <label for="editLyrics">歌词（LRC 格式）</label>
                <textarea id="editLyrics" rows="8" placeholder="[00:12.00]第一句歌词&#10;[00:17.20]第二句歌词&#10;[00:22.50]第三句歌词"></textarea>
                <p class="form-hint">LRC 格式：每行 [mm:ss.xx]歌词文本，如 [01:23.45]这是歌词</p>
              </div>
              <div class="form-actions">
                <button type="button" class="btn-cancel" id="btnCancel">取消</button>
                <button type="submit" class="btn-save">保存</button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- 歌手编辑表单 -->
    <div class="admin-form-overlay" id="artistFormOverlay">
      <div class="admin-form-card">
        <div class="admin-form-header">
          <h3 class="admin-form-title">编辑歌手</h3>
          <button class="btn-form-close" id="btnArtistFormClose" aria-label="关闭">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <form class="admin-form" id="artistForm">
          <input type="hidden" id="editArtistId" value="-1">
          <div class="form-group">
            <label for="editArtistName">歌手名称</label>
            <input type="text" id="editArtistName" placeholder="歌手名称">
          </div>
          <div class="form-group">
            <label for="editArtistCover">歌手封面链接</label>
            <input type="url" id="editArtistCover" placeholder="https://example.com/artist.jpg">
          </div>
          <div class="form-actions">
            <button type="button" class="btn-cancel" id="btnArtistCancel">取消</button>
            <button type="submit" class="btn-save">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 专辑编辑表单 -->
    <div class="admin-form-overlay" id="albumFormOverlay">
      <div class="admin-form-card">
        <div class="admin-form-header">
          <h3 class="admin-form-title">编辑专辑</h3>
          <button class="btn-form-close" id="btnAlbumFormClose" aria-label="关闭">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <form class="admin-form" id="albumForm">
          <input type="hidden" id="editAlbumId" value="-1">
          <div class="form-group">
            <label for="editAlbumName">专辑名称</label>
            <input type="text" id="editAlbumName" placeholder="专辑名称">
          </div>
          <div class="form-group">
            <label for="editAlbumCover">专辑封面链接</label>
            <input type="url" id="editAlbumCover" placeholder="https://example.com/album.jpg">
          </div>
          <div class="form-actions">
            <button type="button" class="btn-cancel" id="btnAlbumCancel">取消</button>
            <button type="submit" class="btn-save">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
