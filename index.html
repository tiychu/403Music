<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>403Music</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23121212'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%231DB954'%3E♪%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">♪</span>
        <span class="logo-text">403Music</span>
      </div>
      <div class="header-actions">
        <a href="artist.html" target="_blank" class="btn-nav-entry" aria-label="歌手" title="浏览歌手">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </a>
        <a href="admin.html" target="_blank" class="btn-admin-entry" aria-label="管理" title="播放列表管理">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </a>
        <button class="btn-lyrics-toggle" id="btnLyricsToggle" aria-label="歌词">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 4 4 20 4 20 7"></polyline>
            <line x1="9" y1="20" x2="15" y2="20"></line>
            <line x1="12" y1="4" x2="12" y2="20"></line>
          </svg>
        </button>
        <button class="btn-playlist-toggle" id="btnPlaylistToggle" aria-label="播放列表">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- 主内容区（PC端三列布局） -->
    <main class="player-main">
      <!-- 左侧：播放列表（PC端常驻） -->
      <div class="playlist-panel" id="playlistPanel">
        <div class="playlist-header">
          <h2 class="playlist-title">播放列表</h2>
          <span class="playlist-count" id="playlistCount">0 首</span>
          <button class="btn-playlist-sort" id="btnPlaylistSort" aria-label="排序" title="拖拽排序">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="2" x2="12" y2="22"></line>
              <polyline points="8 6 12 2 16 6"></polyline>
              <polyline points="8 18 12 22 16 18"></polyline>
            </svg>
          </button>
          <button class="btn-playlist-close" id="btnPlaylistClose" aria-label="关闭播放列表">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <ul class="playlist" id="playlist"></ul>
      </div>

      <!-- 中间：播放器 -->
      <div class="player-glow-wrapper">
        <div class="player-glow" id="playerGlow">
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
        </div>
        <div class="player-left">
        <!-- CD 机风格封面 -->
        <div class="cover-wrapper" id="coverWrapper">
          <div class="cd-container" id="cdContainer">
            <div class="cd-disc">
              <img class="cd-cover" id="coverImage" src="https://placehold.co/400x400/282828/535353?text=403Music" alt="封面" onerror="this.src='https://placehold.co/400x400/282828/535353?text=403Music'">
              <div class="cd-center-hole"></div>
            </div>
            <div class="cd-glow" id="coverGlow"></div>
          </div>
        </div>

        <!-- 歌曲信息 -->
        <div class="song-info">
          <h1 class="song-title" id="songTitle">403Music</h1>
          <p class="song-artist" id="songArtist">等待播放...</p>
          <p class="song-album" id="songAlbum"></p>
        </div>

        <!-- 进度条 -->
        <div class="progress-section">
          <span class="time time-current" id="timeCurrent">0:00</span>
          <div class="progress-bar-wrapper" id="progressBarWrapper">
            <input type="range" class="progress-range" id="progressRange" min="0" max="1000" value="0" step="1">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="time time-total" id="timeTotal">0:00</span>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
          <button class="btn-control btn-shuffle" id="btnShuffle" aria-label="随机播放">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"></polyline>
              <line x1="4" y1="20" x2="21" y2="3"></line>
              <polyline points="21 16 21 21 16 21"></polyline>
              <line x1="15" y1="15" x2="21" y2="21"></line>
              <line x1="4" y1="4" x2="9" y2="9"></line>
            </svg>
          </button>
          <button class="btn-control btn-prev" id="btnPrev" aria-label="上一首">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button class="btn-control btn-play" id="btnPlay" aria-label="播放">
            <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="btn-control btn-next" id="btnNext" aria-label="下一首">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
          <button class="btn-control btn-repeat" id="btnRepeat" aria-label="循环模式">
            <svg class="icon-repeat" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
            </svg>
            <svg class="icon-repeat-one" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polyline points="17 1 21 5 17 9"></polyline>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
              <polyline points="7 23 3 19 7 15"></polyline>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
              <text x="12" y="15" text-anchor="middle" font-size="8" font-weight="600" fill="currentColor" stroke="none">1</text>
            </svg>
          </button>
        </div>

        <!-- 音量控制 -->
        <div class="volume-section">
          <button class="btn-volume-icon" id="btnVolumeIcon" aria-label="音量">
            <svg class="icon-volume-high" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg class="icon-volume-mute" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </button>
          <div class="volume-bar-wrapper">
            <input type="range" class="volume-range" id="volumeRange" min="0" max="100" value="80" step="1">
            <div class="volume-fill" id="volumeFill" style="width:80%"></div>
          </div>
        </div>
      </div>
      </div>

      <!-- 右侧：歌词区域（PC端始终显示） -->
      <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyrics-header">
          <h2 class="lyrics-title">歌词</h2>
          <button class="btn-lyrics-close" id="btnLyricsClose" aria-label="关闭歌词">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="lyrics-scroll" id="lyricsScroll">
          <div class="lyrics-empty" id="lyricsEmpty">暂无歌词</div>
          <div class="lyrics-lines" id="lyricsLines"></div>
        </div>
      </div>
    </main>

    <!-- 遮罩层（移动端用） -->
    <div class="overlay" id="overlay"></div>

    <!-- iframe 覆盖层（子页面导航，不中断播放） -->
    <div class="iframe-overlay" id="iframeOverlay">
      <button class="btn-iframe-back" id="btnIframeBack" aria-label="返回播放器">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>返回播放器</span>
      </button>
      <iframe class="iframe-content" id="iframeContent" allow="autoplay"></iframe>
    </div>
  </div>

  <audio id="audioPlayer" preload="auto" crossorigin="anonymous"></audio>
  <script src="app.js"></script>
</body>
</html>
